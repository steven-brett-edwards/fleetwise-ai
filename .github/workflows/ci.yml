name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --settings coverage.runsettings --logger "console;verbosity=normal"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

  frontend:
    name: Frontend (Angular 18)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/fleetwise-client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/fleetwise-client/package-lock.json

      - name: Install dependencies
        # Using `npm install` rather than `npm ci`: npm 11 vs npm 10 resolve
        # chokidar@5 peer deps differently (angular-eslint transitives), which
        # makes strict `npm ci` brittle across local/CI. Build reproducibility
        # is acceptable for this portfolio project.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Test (headless Chrome, coverage)
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/fleetwise-client/coverage/
          if-no-files-found: warn
