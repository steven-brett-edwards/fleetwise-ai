# Render blueprint for FleetWise AI.
#
# Deploys two services:
#   1. fleetwise-api       -- ASP.NET Core 9 API in a Docker container,
#                             talking to Groq's OpenAI-compatible endpoint
#                             for chat + function calling. RAG / embeddings
#                             are disabled in this deployment (Groq has no
#                             embeddings API); the DocumentSearch plugin
#                             is skipped at startup.
#   2. fleetwise-frontend  -- Angular 21 static site, with /api/* routed
#                             to the API service so the SPA still speaks
#                             same-origin.
#
# How to deploy:
#   1. Create a free Render account (github.com OAuth).
#   2. Dashboard -> New -> Blueprint, pick this repo, pick branch `main`.
#   3. Render reads this file and spins up both services.
#   4. After the first deploy, open the fleetwise-api service and paste
#      your Groq API key into the GROQ_API_KEY environment variable
#      (marked `sync: false` below -- Render will prompt for it).
#   5. Kick off a manual redeploy of the API so the key takes effect.
#
# Cost: both services run on Render's free tier. The API sleeps after
# 15 minutes of inactivity and takes ~30s to wake back up on the next
# request -- expected behavior for a portfolio demo.

services:
  - type: web
    name: fleetwise-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./src/FleetWise.Api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/vehicles
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: AiProvider
        value: Groq
      - key: Groq__Endpoint
        value: https://api.groq.com/openai/v1
      - key: Groq__ChatModel
        value: openai/gpt-oss-20b
      - key: Groq__ApiKey
        sync: false  # paste the real key in the Render dashboard after first deploy
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/app/data/db/fleetwise.db
      # CORS: allow the deployed frontend origin (and localhost for smoke tests).
      # Indexed keys (__0, __1) bind to a string[] at Cors:AllowedOrigins.
      - key: Cors__AllowedOrigins__0
        value: https://fleetwise-frontend.onrender.com
      - key: Cors__AllowedOrigins__1
        value: http://localhost:4200

  - type: web
    name: fleetwise-frontend
    runtime: static
    # Static sites on Render are always free-tier / edge-hosted; no `plan` field applies.
    buildCommand: cd src/fleetwise-client && npm ci && npm run build -- --configuration production
    staticPublishPath: ./src/fleetwise-client/dist/fleetwise-client/browser
    routes:
      # SPA fallback -- every non-asset path returns index.html so Angular
      # client-side routing works on hard refresh. The SPA talks to the API
      # via the absolute URL baked into environment.prod.ts; CORS is enabled
      # on the API to permit this cross-origin call. Render static-site
      # rewrites to a different service are intentionally not used -- they
      # ship requests through as-is and don't interpolate wildcard tokens.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
