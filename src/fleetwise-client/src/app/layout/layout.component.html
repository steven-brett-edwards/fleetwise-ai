<mat-sidenav-container>
  <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">directions_car</mat-icon>
      <span class="logo-text">FleetWise AI</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="onNavItemClick()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/chat" routerLinkActive="active-link" (click)="onNavItemClick()">
        <mat-icon matListItemIcon>chat</mat-icon>
        <span matListItemTitle>AI Chat</span>
      </a>
      <a mat-list-item routerLink="/vehicles" routerLinkActive="active-link" (click)="onNavItemClick()">
        <mat-icon matListItemIcon>local_shipping</mat-icon>
        <span matListItemTitle>Vehicles</span>
      </a>
      <a mat-list-item routerLink="/work-orders" routerLinkActive="active-link" (click)="onNavItemClick()">
        <mat-icon matListItemIcon>build</mat-icon>
        <span matListItemTitle>Work Orders</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isMobile) {
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span>FleetWise AI</span>
      <span class="toolbar-spacer"></span>
      <span class="toolbar-subtitle">Fleet Maintenance Assistant</span>
    </mat-toolbar>
    <main class="content-container">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
