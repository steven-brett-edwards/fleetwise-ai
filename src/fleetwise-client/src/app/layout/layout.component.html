<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">directions_car</mat-icon>
      <span class="logo-text">FleetWise AI</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/chat" routerLinkActive="active-link">
        <mat-icon matListItemIcon>chat</mat-icon>
        <span matListItemTitle>AI Chat</span>
      </a>
      <a mat-list-item routerLink="/vehicles" routerLinkActive="active-link">
        <mat-icon matListItemIcon>local_shipping</mat-icon>
        <span matListItemTitle>Vehicles</span>
      </a>
      <a mat-list-item routerLink="/work-orders" routerLinkActive="active-link">
        <mat-icon matListItemIcon>build</mat-icon>
        <span matListItemTitle>Work Orders</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="app-content">
    <mat-toolbar color="primary" class="app-toolbar">
      <span>FleetWise AI</span>
      <span class="toolbar-spacer"></span>
      <span class="toolbar-subtitle">Fleet Maintenance Assistant</span>
    </mat-toolbar>
    <main class="content-container">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
